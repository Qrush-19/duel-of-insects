<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DUEL OF INSECTS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a1a08;--p1c:#4dff6e;--p2c:#ff4d6e;--gold:#f0c040;--text:#e8f0e0;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Share Tech Mono',monospace;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100vh;overflow:hidden;cursor:default;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 80%,rgba(30,80,10,.4) 0%,transparent 60%),
    radial-gradient(ellipse at 0% 50%,rgba(0,60,0,.3) 0%,transparent 40%),
    radial-gradient(ellipse at 100% 50%,rgba(60,0,0,.2) 0%,transparent 40%);
  pointer-events:none;
}
#wrapper{position:relative;width:860px;height:580px;}

/* HUD */
#hud{display:flex;align-items:center;justify-content:space-between;padding:0 0 8px;gap:12px;}
.hud-side{display:flex;flex-direction:column;gap:5px;flex:1;}
.fighter-name{font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:3px;}
#p1-name{color:var(--p1c);text-shadow:0 0 10px rgba(77,255,110,.5);}
#p2-name{color:var(--p2c);text-shadow:0 0 10px rgba(255,77,110,.5);text-align:right;}
.hp-wrap{height:16px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:2px;overflow:hidden;position:relative;}
.hp-fill{height:100%;transition:width .08s linear;}
#p1-hp{background:linear-gradient(90deg,#1a9930,#4dff6e);}
#p2-hp{background:linear-gradient(90deg,#ff4d6e,#9a1a2a);float:right;}
.hp-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:#fff;text-shadow:0 1px 2px #000;pointer-events:none;}
.win-bars{display:flex;gap:5px;}
.win-bar{width:26px;height:9px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);border-radius:2px;transition:all .2s;}
.win-bar.filled-p1{background:var(--p1c);box-shadow:0 0 8px var(--p1c);}
.win-bar.filled-p2{background:var(--p2c);box-shadow:0 0 8px var(--p2c);}
.hud-center{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:120px;}
.round-disp{font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:4px;color:var(--gold);}
#ping-disp{font-size:9px;letter-spacing:1px;opacity:.4;}
canvas{display:block;box-shadow:0 0 80px rgba(0,0,0,.8);}
#key-guide{display:flex;gap:16px;justify-content:center;margin-top:7px;font-size:9px;letter-spacing:1px;opacity:.3;}

/* Overlays */
.overlay{
  position:absolute;left:0;right:0;top:44px;height:480px;
  background:rgba(5,12,4,.93);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;backdrop-filter:blur(10px);z-index:100;
}
.overlay.hidden{display:none;}
.overlay h1{font-family:'Cinzel Decorative',serif;font-size:46px;letter-spacing:8px;color:var(--gold);text-shadow:0 0 30px rgba(240,192,64,.6);}
.overlay p{font-size:11px;letter-spacing:2px;opacity:.45;text-align:center;line-height:2.2;}
.sub{font-family:'Cinzel Decorative',serif;font-size:15px;letter-spacing:5px;opacity:.7;}
.btn{font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:5px;padding:12px 34px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;}
.btn:hover{background:rgba(240,192,64,.1);box-shadow:0 0 20px rgba(240,192,64,.3);}
.btn-row{display:flex;gap:12px;}

/* Lobby */
#room-code{
  font-family:'Cinzel Decorative',serif;font-size:38px;letter-spacing:12px;
  color:var(--p1c);text-shadow:0 0 20px rgba(77,255,110,.5);
  background:rgba(77,255,110,.06);border:1px solid rgba(77,255,110,.2);
  padding:12px 28px;border-radius:4px;cursor:pointer;
  transition:all .15s;
}
#room-code:hover{background:rgba(77,255,110,.12);}
#join-input{
  font-family:'Cinzel Decorative',serif;font-size:22px;letter-spacing:8px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2);
  color:var(--text);padding:10px 20px;text-align:center;outline:none;
  width:200px;text-transform:uppercase;
}
#join-input:focus{border-color:var(--p2c);}
.status-text{font-size:11px;letter-spacing:3px;opacity:.5;text-align:center;}
#link-copied{color:var(--p1c);font-size:10px;letter-spacing:2px;opacity:0;transition:opacity .3s;}

/* 이름 입력 */
.name-input{
  font-family:'Cinzel Decorative',serif;font-size:18px;letter-spacing:4px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2);
  color:var(--text);padding:10px 18px;text-align:center;outline:none;
  width:260px;border-radius:3px;
}
.name-input:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,64,.2);}
.name-label{font-size:10px;letter-spacing:3px;opacity:.45;margin-bottom:-10px;}

/* 색상 선택 */
.color-label{font-size:10px;letter-spacing:3px;opacity:.45;}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:280px;}
.color-swatch{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .15s;
  position:relative;
}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.6);transform:scale(1.2);}

/* Announce */
#announce{
  position:absolute;left:0;right:0;top:calc(44px + 150px);
  text-align:center;font-family:'Cinzel Decorative',serif;
  font-size:40px;letter-spacing:10px;color:#fff;
  text-shadow:0 0 30px #fff,0 0 60px rgba(240,192,64,.8);
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:50;
}
#announce.show{opacity:1;}

/* 키뷰어 */
#key-viewer{
  position:absolute;
  bottom:-18px; left:50%; transform:translateX(-50%);
  display:flex;gap:14px;align-items:flex-end;
  pointer-events:none;z-index:10;
  opacity:0;transition:opacity .3s;
}
#key-viewer.visible{opacity:1;}
.kv-group{display:flex;flex-direction:column;gap:3px;}
.kv-row{display:flex;gap:3px;justify-content:center;}
.kv-key{
  width:26px;height:26px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.15);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-family:'Share Tech Mono',monospace;
  color:rgba(255,255,255,.4);
  transition:all .05s;
}
.kv-key.active{
  background:rgba(255,255,255,.2);
  border-color:rgba(255,255,255,.5);
  color:#fff;
  box-shadow:0 0 8px rgba(255,255,255,.3);
  transform:scale(.93);
}
.kv-atk.active{
  background:rgba(240,192,64,.25);
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:0 0 8px rgba(240,192,64,.4);
}
.kv-block.active{
  background:rgba(77,180,255,.25);
  border-color:#4db4ff;
  color:#4db4ff;
  box-shadow:0 0 8px rgba(77,180,255,.4);
}
.kv-ult.active{
  background:rgba(200,100,255,.25);
  border-color:#c864ff;
  color:#c864ff;
  box-shadow:0 0 8px rgba(200,100,255,.5);
}
.kv-key.cooldown{
  background:rgba(255,60,60,.12);
  border-color:rgba(255,60,60,.4);
  color:rgba(255,100,100,.7);
  font-size:9px;
}

/* 캐릭터 선택 */
.char-select{display:flex;gap:12px;justify-content:center;}
.char-card{
  width:64px;padding:8px 0;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;cursor:pointer;
  text-align:center;transition:all .15s;
}
.char-card:hover{background:rgba(255,255,255,.1);transform:scale(1.05);}
.char-card.selected{
  border-color:var(--gold);
  background:rgba(240,192,64,.1);
  box-shadow:0 0 12px rgba(240,192,64,.3);
}
.char-icon{font-size:28px;line-height:1;}
.char-name{font-size:9px;letter-spacing:2px;opacity:.6;margin-top:4px;}
.queue-dots{display:flex;gap:10px;margin:8px 0;}
.queue-dots span{
  width:10px;height:10px;border-radius:50%;
  background:var(--gold);
  animation:qdot .9s infinite ease-in-out;
}
.queue-dots span:nth-child(2){animation-delay:.2s;}
.queue-dots span:nth-child(3){animation-delay:.4s;}
@keyframes qdot{
  0%,80%,100%{transform:scale(.4);opacity:.3;}
  40%{transform:scale(1);opacity:1;}
}
</style>
</head>
<body>
<div id="wrapper">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-side">
      <div class="fighter-name" id="p1-name">🦗 VERDE</div>
      <div class="hp-wrap"><div class="hp-fill" id="p1-hp" style="width:100%"></div><div class="hp-val" id="p1-hpval">100</div></div>
      <div class="win-bars" id="p1-wins"><div class="win-bar" id="p1-w0"></div><div class="win-bar" id="p1-w1"></div><div class="win-bar" id="p1-w2"></div></div>
    </div>
    <div class="hud-center">
      <div class="round-disp" id="round-disp">ROUND 1</div>
      <div id="ping-disp">— ms</div>
    </div>
    <div class="hud-side">
      <div class="fighter-name" id="p2-name" style="text-align:right;">ROJO 🦗</div>
      <div class="hp-wrap"><div class="hp-fill" id="p2-hp" style="width:100%;float:right"></div><div class="hp-val" id="p2-hpval">100</div></div>
      <div class="win-bars" id="p2-wins" style="justify-content:flex-end;"><div class="win-bar" id="p2-w0"></div><div class="win-bar" id="p2-w1"></div><div class="win-bar" id="p2-w2"></div></div>
    </div>
  </div>

  <canvas id="c" width="860" height="480"></canvas>

  <!-- 키뷰어 -->
  <div id="key-viewer">
    <div class="kv-group">
      <div class="kv-row">
        <div class="kv-key" id="kv-up">↑</div>
      </div>
      <div class="kv-row">
        <div class="kv-key" id="kv-left">←</div>
        <div class="kv-key" id="kv-down">↓</div>
        <div class="kv-key" id="kv-right">→</div>
      </div>
    </div>
    <div class="kv-group">
      <div class="kv-row">
        <div class="kv-key kv-atk" id="kv-a">A</div>
        <div class="kv-key kv-atk" id="kv-s">S</div>
        <div class="kv-key kv-atk" id="kv-d">D</div>
        <div class="kv-key kv-ult" id="kv-r">R</div>
      </div>
      <div class="kv-row">
        <div class="kv-key kv-block" id="kv-f">F</div>
      </div>
    </div>
  </div>

  <div id="announce"></div>

  <!-- 메인 메뉴 -->
  <div class="overlay" id="menu-screen">
    <h1>DUEL OF INSECTS</h1>
    <div class="name-label">내 닉네임</div>
    <input class="name-input" id="my-name-input" maxlength="12" placeholder="닉네임 입력..." spellcheck="false">
    <div class="color-label">사마귀 색상</div>
    <div class="color-swatches" id="color-swatches"></div>
    <div class="color-label">캐릭터 선택</div>
    <div class="char-select" id="char-select">
      <div class="char-card selected" id="char-mantis" onclick="selectChar('mantis')">
        <div class="char-icon">🦗</div>
        <div class="char-name">사마귀</div>
      </div>
      <div class="char-card" id="char-bee" onclick="selectChar('bee')">
        <div class="char-icon">🐝</div>
        <div class="char-name">벌</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="showCreate()">방 만들기</button>
      <button class="btn" onclick="showJoin()">방 입장</button>
    </div>
    <div class="btn-row">
      <button class="btn" style="border-color:#f0c040;color:#f0c040;" onclick="startQuickMatch()">⚡ QUICK MATCH</button>
      <button class="btn" style="border-color:var(--p2c);color:var(--p2c);" onclick="startVsCPU()">🤖 VS CPU</button>
    </div>
    <p style="opacity:.25;font-size:10px;">링크로 도전장 보내기 · 실시간 온라인 대전</p>
  </div>

  <!-- 방 만들기 -->
  <div class="overlay hidden" id="create-screen">
    <div class="sub">내 방 코드</div>
    <div id="room-code" onclick="copyLink()" title="클릭해서 초대 링크 복사">······</div>
    <div id="link-copied">✓ 링크가 복사됐어요!</div>
    <div class="status-text" id="create-status">상대방을 기다리는 중...</div>
    <button class="btn" onclick="copyLink()">초대 링크 복사</button>
    <button class="btn" style="opacity:.4;font-size:9px;" onclick="showMenu()">← 돌아가기</button>
  </div>

  <!-- 방 입장 -->
  <div class="overlay hidden" id="join-screen">
    <div class="sub">방 코드 입력</div>
    <input id="join-input" maxlength="6" placeholder="XXXXXX" oninput="this.value=this.value.toUpperCase()">
    <button class="btn" onclick="joinRoom()">입장</button>
    <div class="status-text" id="join-status"></div>
    <button class="btn" style="opacity:.4;font-size:9px;" onclick="showMenu()">← 돌아가기</button>
  </div>

  <!-- Quick Match 대기 -->
  <div class="overlay hidden" id="queue-screen">
    <h1 style="font-size:30px">QUICK MATCH</h1>
    <div class="queue-dots"><span></span><span></span><span></span></div>
    <div class="status-text">상대방을 찾는 중...</div>
    <button class="btn" style="opacity:.4;font-size:9px;" onclick="cancelQueue()">← 취소</button>
  </div>

  <!-- 결과 -->
  <div class="overlay hidden" id="result-screen">
    <div class="sub" id="result-winner"></div>
    <h1 style="font-size:30px">WINS!</h1>
    <button class="btn" onclick="requestRematch()">REMATCH</button>
    <button class="btn" style="opacity:.5;font-size:9px;" onclick="showMenu()">← 메뉴</button>
  </div>

  <!-- 연결 끊김 -->
  <div class="overlay hidden" id="disconnect-screen">
    <h1 style="font-size:28px">DISCONNECTED</h1>
    <p>상대방의 연결이 끊겼습니다.</p>
    <button class="btn" onclick="showMenu()">← 메뉴</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  WebSocket 연결
// ════════════════════════════════════════════════════
const WS_URL = location.protocol === 'https:'
  ? 'wss://' + location.host
  : 'ws://' + location.host;

let ws = null;
let myRole = null;
let myRoomId = null;
let myName = 'PLAYER';
let myColor = '#7fff8a';
let myCharType = 'mantis';  // 'mantis' | 'bee'
let opponentName = 'OPPONENT';
let pingStart = 0, latency = 0;
let rematchVote = false;

// ── 색상 팔레트 ──
const COLOR_PALETTE = [
  {hex:'#7fff8a', label:'라임'},
  {hex:'#40e0ff', label:'하늘'},
  {hex:'#ff6b9d', label:'핑크'},
  {hex:'#ffdd57', label:'노랑'},
  {hex:'#ff8c42', label:'오렌지'},
  {hex:'#c77dff', label:'보라'},
  {hex:'#ff4444', label:'빨강'},
  {hex:'#ffffff', label:'흰색'},
  {hex:'#4dffb8', label:'민트'},
  {hex:'#ff9ef5', label:'연보라'},
];

function initColorPicker(){
  const wrap = document.getElementById('color-swatches');
  wrap.innerHTML = '';
  COLOR_PALETTE.forEach((c,i)=>{
    const el = document.createElement('div');
    el.className = 'color-swatch' + (i===0?' selected':'');
    el.style.background = c.hex;
    el.style.boxShadow = `0 0 8px ${c.hex}66`;
    el.title = c.label;
    el.onclick = ()=>{
      document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
      el.classList.add('selected');
      myColor = c.hex;
    };
    wrap.appendChild(el);
  });
}

function selectChar(type){
  myCharType=type;
  document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('char-'+type).classList.add('selected');
}

function connectWS(cb) {
  if(!location.host) return; // 로컬 파일로 열었을 때 방지
  ws = new WebSocket(WS_URL);
  ws.onopen = cb;
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onclose = () => {
    if(running && !isCPUMode) showDisconnect();
  };
}

function wsSend(data) {
  if(ws && ws.readyState === 1) ws.send(JSON.stringify(data));
}

// ── 핑 측정 ──
setInterval(() => {
  if(ws && ws.readyState===1){ pingStart=Date.now(); wsSend({type:'ping',t:pingStart}); }
}, 2000);

// ════════════════════════════════════════════════════
//  서버 메시지 처리
// ════════════════════════════════════════════════════
function handleMessage(msg) {
  switch(msg.type) {
    case 'room_created':
      myRoomId = msg.roomId;
      document.getElementById('room-code').textContent = msg.roomId;
      // URL에 방 코드 포함
      history.replaceState(null,'','?room='+msg.roomId);
      break;

    case 'game_start':
      myRole = msg.yourRole;
      document.getElementById('create-screen').classList.add('hidden');
      document.getElementById('join-screen').classList.add('hidden');
      document.getElementById('queue-screen').classList.add('hidden');
      // 내 이름+색상 상대에게 전송
      wsSend({ type: 'player_name', name: myName, color: myColor, charType: myCharType });
      initGame();
      break;

    case 'queue_waiting':
      break;

    case 'player_name':
      opponentName = msg.name || 'OPPONENT';
      if(msg.color||msg.charType){
        const opp = myRole==='host' ? p2 : p1;
        if(opp){
          if(msg.color) opp.color = msg.color;
          if(msg.charType) opp.charType = msg.charType;
        }
      }
      updateNameHUD();
      break;

    case 'opponent_input':
      // guest에서 host로, 또는 host에서 guest로 상대 입력 수신
      opponentKeys = msg.keys;
      break;

    case 'game_state':
      // guest는 host에서 받은 상태로 화면 업데이트
      if(myRole === 'guest') applyRemoteState(msg.state);
      break;

    case 'round_event':
      handleRoundEvent(msg.event);
      break;

    case 'pong':
      latency = Date.now() - msg.t;
      document.getElementById('ping-disp').textContent = latency + ' ms';
      break;

    case 'opponent_disconnected':
      showDisconnect();
      break;

    case 'error':
      document.getElementById('join-status').textContent = '⚠ ' + msg.message;
      break;
  }
}

// ════════════════════════════════════════════════════
//  UI 화면 전환
// ════════════════════════════════════════════════════
function showMenu() {
  running = false;
  isCPUMode = false;
  // 키뷰어 숨기기
  document.getElementById('key-viewer').classList.remove('visible');
  ['menu-screen','create-screen','join-screen','queue-screen','result-screen','disconnect-screen']
    .forEach(id => document.getElementById(id).classList.toggle('hidden', id!=='menu-screen'));
}

function startQuickMatch() {
  myName = document.getElementById('my-name-input').value.trim().toUpperCase() || 'PLAYER';
  connectWS(() => {
    wsSend({ type: 'quick_match', name: myName });
  });
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('queue-screen').classList.remove('hidden');
}

function cancelQueue() {
  wsSend({ type: 'cancel_queue' });
  showMenu();
}

function startVsCPU() {
  isCPUMode = true;
  myRole = 'host';
  myName = document.getElementById('my-name-input').value.trim().toUpperCase() || 'PLAYER';
  opponentName = 'CPU';
  document.getElementById('menu-screen').classList.add('hidden');
  initGame();
}// ── 키뷰어 ──
function updateKeyViewer(){
  const kv = document.getElementById('key-viewer');
  if(!running||gamePhase!=='fight'){ kv.classList.remove('visible'); return; }
  kv.classList.add('visible');
  const map = {
    'kv-up':    keys['ArrowUp'],
    'kv-left':  keys['ArrowLeft'],
    'kv-down':  keys['ArrowDown'],
    'kv-right': keys['ArrowRight'],
    'kv-a':     keys['KeyA'],
    'kv-s':     keys['KeyS'],
    'kv-d':     keys['KeyD'],
    'kv-f':     keys['KeyF'],
    'kv-r':     keys['KeyR'],
  };
  for(const [id, active] of Object.entries(map)){
    document.getElementById(id).classList.toggle('active', !!active);
  }
  // D키 쿨타임 표시
  const myMantis = myRole==='guest' ? p2 : p1;
  const dKey = document.getElementById('kv-d');
  if(myMantis && myMantis.specialCooldown>0){
    dKey.classList.add('cooldown');
    dKey.textContent = Math.ceil(myMantis.specialCooldown);
  } else {
    dKey.classList.remove('cooldown');
    dKey.textContent = 'D';
  }
  // R키 쿨타임 표시
  const rKey = document.getElementById('kv-r');

  } else {

  }
}
function aiUpdate(ai, opp, dt) {
  if(ai.hitstun>0||ai.hp<=0) return;
  ai.aiTimer=(ai.aiTimer||0)-dt;
  if(ai.aiTimer>0) return;
  const dx=opp.x-ai.x, dist=Math.abs(dx), r=Math.random();
  if(dist<80){
    if(r<0.05){ ai.blocking=true; ai.aiTimer=0.3; return; }
    ai.blocking=false;
    if(r<0.25){ ai.attack('strong'); ai.aiTimer=0.5; }
    else if(r<0.45){ ai.attack('weak'); ai.aiTimer=0.28; }
    else if(r<0.55){ ai.attack('special'); ai.aiTimer=0.7; }
    else if(r<0.70){ ai.vx=-dx/Math.abs(dx)*220; ai.aiTimer=0.2; }
    else { ai.aiTimer=0.15; }
  } else if(dist<160){
    ai.blocking=false;
    if(r<0.4){ ai.vx=dx>0?210:-210; ai.aiTimer=0.12; }
    else if(r<0.55){ ai.attack('weak'); ai.aiTimer=0.3; }
    else if(r<0.65&&ai.onGround){ ai.jump(); ai.aiTimer=0.4; }
    else { ai.aiTimer=0.1; }
  } else {
    ai.blocking=false;
    ai.vx=dx>0?230:-230; ai.aiTimer=0.1;
    if(r<0.2&&ai.onGround){ ai.jump(); ai.aiTimer=0.5; }
  }
}

let particles=[];
function burst(x,y,color,n=10,strong=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=strong?100+Math.random()*180:40+Math.random()*100;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:1,color,size:strong?3+Math.random()*5:2+Math.random()*3});
  }
}
function spark(x,y,dir,color){
  for(let i=0;i<8;i++){
    const a=-Math.PI/2+(Math.random()-.5)*2.2+dir*.3;
    particles.push({x,y,vx:Math.cos(a)*(80+Math.random()*160),vy:Math.sin(a)*(60+Math.random()*120)-40,life:.7,color,size:3+Math.random()*4,spark:true});
  }
}

let stingers=[];

function fireStinger(owner, x, y, facing, color){
  stingers.push({
    owner,          // 'p1' | 'p2'
    x, y,
    vx: facing * -520,  // facing=-1이 오른쪽이므로 반전
    vy: 0,
    color,
    life: 1.2,      // 1.2초 후 소멸
    hit: false,
  });
}

function updateStingers(dt, p1, p2){
  for(const s of stingers){
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.life -= dt;
    if(s.hit || s.life<=0) continue;
    // 충돌 체크
    const target = s.owner==='p1' ? p2 : p1;
    if(!target||target.hp<=0||target.invincible>0) continue;
    const dx=Math.abs(s.x-target.x), dy=Math.abs(s.y-(target.y-40));
    if(dx<28&&dy<40){
      const dmg = target.blocking ? 1 : 6;
      target.hp = Math.max(0, target.hp-dmg);
      if(!target.blocking){
        target.vx = (s.vx>0?1:-1)*180;
        target.hitstun=.15; target.invincible=.2;
        target.state='hurt'; target.stateTimer=.15;
      }
      spark(s.x, s.y, 0, s.color);
      burst(s.x, s.y, s.color, 6, false);
      s.hit=true;
    }
  }
  stingers = stingers.filter(s=>!s.hit && s.life>0);
}

function drawStingers(){
  for(const s of stingers){
    const alpha = Math.min(1, s.life*2);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(s.x, s.y);
    ctx.rotate(Math.atan2(s.vy, s.vx));
    // 침 몸통
    ctx.beginPath();
    ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
    ctx.strokeStyle = s.color; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.shadowColor = s.color; ctx.shadowBlur = 8;
    ctx.stroke();
    // 침 끝
    ctx.beginPath();
    ctx.moveTo(10,0); ctx.lineTo(16,-3); ctx.lineTo(16,3); ctx.closePath();
    ctx.fillStyle = '#fff'; ctx.fill();
    // 꼬리 잔상
    ctx.beginPath();
    ctx.moveTo(-10,0); ctx.lineTo(-22,0);
    ctx.strokeStyle=s.color+'66'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  }
}

    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-4,-20);ctx.stroke();
    ctx.translate(-4,-20);ctx.rotate(-1.2+(attackState?1:0));
    ctx.strokeStyle=state==='special'?'#fff':gc;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(8,-8,14,-4,12,6);ctx.stroke();
    ctx.beginPath();ctx.arc(12,6,3,0,Math.PI*2);ctx.fillStyle=state==='special'?'#fff':gc+'ee';ctx.fill();
    ctx.restore();
  }
  // 머리
  ctx.save();ctx.translate(-12,-32);

  ctx.translate(-2,-8);ctx.rotate(attackState?-.3*facing:0);
  ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.lineTo(2,-14);ctx.lineTo(-2,-14);ctx.closePath();ctx.fillStyle=gc;ctx.fill();

  ctx.beginPath();ctx.ellipse(-6,-6,5,6,.3,0,Math.PI*2);ctx.fill();

  const aw=Math.sin(t*.07)*8;
  ctx.strokeStyle=gc+'88';ctx.lineWidth=1;ctx.lineCap='round';

  ctx.restore();

  // 흉부
  ctx.beginPath();ctx.ellipse(-2,-20,9,11,-.1,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.beginPath();ctx.ellipse(-2,-20,7,9,-.1,0,Math.PI*2);
  ctx.fillStyle=gc;ctx.globalAlpha=.6;ctx.fill();ctx.globalAlpha=1;

  // 다리 (6개)
  for(let i=0;i<3;i++){
    const legSwing=Math.sin(t*.25+i*1.1)*10;
    [1,-1].forEach(s=>{
      ctx.save();ctx.translate(i*6-4,-14+i*2);ctx.rotate(s*(.5+i*.1)+(legSwing*.015)*s);
      ctx.strokeStyle=gc+'bb';ctx.lineWidth=1.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(10,7);ctx.stroke();
      ctx.translate(10,7);ctx.rotate(s*.5);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(7,7);ctx.stroke();
      ctx.restore();
    });
  }

  // 앞다리 (공격용 펀치)
  const a1=attackState?-2.0:(blocking?-1.0:-.6+Math.sin(t*.06)*.1);
  for(let s of[1,-1]){
    ctx.save();ctx.translate(-6,-22);ctx.scale(1,s);
    ctx.rotate(a1);
    ctx.strokeStyle=gc;ctx.lineWidth=3.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-10,-12);ctx.stroke();
    ctx.translate(-10,-12);ctx.rotate(attackState?.4:-.3);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-8,-10);ctx.stroke();
    // 주먹
    ctx.beginPath();ctx.ellipse(-8,-10,5,4,.3,0,Math.PI*2);
    ctx.fillStyle=attackState?'#fff':gc;ctx.fill();
    ctx.restore();
  }

  // 머리 (둥근 벌 머리)
  ctx.save();ctx.translate(-12,-34);
  ctx.beginPath();ctx.ellipse(0,0,10,10,0,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.beginPath();ctx.ellipse(0,0,8,8,0,0,Math.PI*2);
  ctx.fillStyle=gc;ctx.fill();
  // 겹눈
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(-5,-3,4,5,.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(5,-3,4,5,-.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=gc+'99';
  ctx.beginPath();ctx.ellipse(-4,-4,1.5,2,.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(5,-4,1.5,2,-.3,0,Math.PI*2);ctx.fill();
  // 더듬이
  const aw2=Math.sin(t*.07)*5;
  ctx.strokeStyle=gc+'aa';ctx.lineWidth=1.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-3,-10);ctx.quadraticCurveTo(-8+aw2,-20,-5+aw2,-26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(3,-10);ctx.quadraticCurveTo(8-aw2,-20,5-aw2,-26);ctx.stroke();
  ctx.beginPath();ctx.arc(-5+aw2,-26,2,0,Math.PI*2);ctx.fillStyle=gc;ctx.fill();
  ctx.beginPath();ctx.arc(5-aw2,-26,2,0,Math.PI*2);ctx.fillStyle=gc;ctx.fill();
  ctx.restore();

  ctx.shadowBlur=0;ctx.restore();
}


const GROUND=390, MAX_HP=100;
class Mantis {
  constructor(x,isP1,color,charType='mantis'){
    this.startX=x;this.x=x;this.y=GROUND;
    this.vx=0;this.vy=0;
    this.facing=isP1?-1:1;this.initFacing=isP1?-1:1;
    this.onGround=true;this.jumps=0;
    this.hp=MAX_HP;this.isP1=isP1;this.color=color;
    this.charType=charType;
    this.state='idle';this.stateTimer=0;
    this.hitbox=null;this.hitstun=0;this.invincible=0;
    this.blocking=false;this.frame=0;
    this.specialCooldown=0;
    this.ultActive=false;this.ultTimer=0;this.ultCooldown=0;this.ultHitTimer=0;
  }
  reset(){
    this.x=this.startX;this.y=GROUND;this.vx=0;this.vy=0;
    this.hp=MAX_HP;this.facing=this.initFacing;
    this.state='idle';this.stateTimer=0;
    this.hitbox=null;this.hitstun=0;this.invincible=0;this.blocking=false;
    this.specialCooldown=0;
    this.ultActive=false;this.ultTimer=0;this.ultCooldown=0;this.ultHitTimer=0;
  }
  attack(type){
    if(this.state==='hurt'||this.state==='dead') return;
    if(this.blocking) return;
    if(this.ultActive) return; // 얼티밋 중 일반 공격 불가
    if(this.stateTimer>0&&(this.state==='weak'||this.state==='strong'||this.state==='special')) return;
    if(type==='weak'){ this.state='weak';this.stateTimer=.22;this.hitbox={ox:this.facing*-48,oy:-72,w:70,h:60,dmg:2,kb:3,type}; }
    else if(type==='strong'){ this.state='strong';this.stateTimer=.38;this.hitbox={ox:this.facing*-52,oy:-80,w:82,h:75,dmg:4,kb:6,type}; }
    else if(type==='special'){
      if(this.specialCooldown>0) return;
      this.state='special';this.stateTimer=.5;this.hitbox={ox:this.facing*-40,oy:-85,w:90,h:85,dmg:6,kb:9,type};
      this.specialCooldown=4;
    }
  }
  ultimate(){
    if(this.state==='dead') return;
    if(this.blocking) return;
    if(this.ultCooldown>0) return;
    if(this.ultActive) return;
    this.ultActive=true;
    this.ultTimer=3;        // 3초 지속
    this.ultCooldown=30;    // 30초 쿨타임
    this.ultHitTimer=0;
    this.invincible=999;    // 지속시간 동안 무적 (ultTimer로 관리)
    burst(this.x,this.y-40,this.color,24,true);
    showAnnounce('ULTIMATE!', this.color);
  }
  jump(){
    if(this.jumps<2){ this.vy=this.jumps===0?-680:-560;this.jumps++;this.onGround=false;burst(this.x,this.y,this.color,5); }
  }
  update(dt,opp){
    this.frame++;
    this.stateTimer=Math.max(0,this.stateTimer-dt);
    this.hitstun=Math.max(0,this.hitstun-dt);
    this.invincible=Math.max(0,this.invincible-dt);
    this.specialCooldown=Math.max(0,this.specialCooldown-dt);
    this.ultCooldown=Math.max(0,(this.ultCooldown||0)-dt);
    if(this.ultActive){
      this.ultTimer=Math.max(0,this.ultTimer-dt);
      this.ultHitTimer=Math.max(0,(this.ultHitTimer||0)-dt);
      if(this.ultTimer<=0){
        // 얼티밋 종료 → 무적 해제
        this.ultActive=false;
        this.invincible=0;
      } else {
        // 무적 유지
        this.invincible=dt+.01;
        // 몸통 충돌로 데미지 + 넉백
        if(this.ultHitTimer<=0&&opp.hp>0&&opp.invincible<=0){
          const dx=opp.x-this.x, dy=(opp.y-40)-(this.y-40);
          const dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<70){
            const dmg=opp.blocking?2:8;
            opp.hp=Math.max(0,opp.hp-dmg);
            if(!opp.blocking){
              const kbDir=dx>0?1:-1;
              opp.vx=kbDir*500; opp.vy=-300;
              opp.hitstun=.3; opp.invincible=.4;
              opp.state='hurt'; opp.stateTimer=.3; opp.onGround=false;
            }
            spark(opp.x,opp.y-30,0,this.color);
            burst(opp.x,opp.y-30,this.color,8,false);
            hitStop=.06;
            this.ultHitTimer=.4;
          }
        }
      }
    }
    if(this.stateTimer<=0&&(this.state==='weak'||this.state==='strong'||this.state==='special'||this.state==='hurt')){ this.state='idle';this.hitbox=null; }
    if(this.hitstun<=0&&this.state==='hurt') this.state='idle';
    // 활공: 벌 캐릭터가 공중에서 ↓ 누르면 중력 대폭 감소
    const isGliding = this.charType==='bee' && !this.onGround && this.gliding;
    const gravity = isGliding ? 200 : 1500;
    if(isGliding && this.vy>60) this.vy=Math.max(60, this.vy-800*dt); // 하강속도 제한
    if(!this.onGround) this.vy+=gravity*dt;
    this.y+=this.vy*dt;this.x+=this.vx*dt;
    if(this.y>=GROUND){ this.y=GROUND;this.vy=0;this.onGround=true;this.jumps=0;this.gliding=false; }
    this.x=Math.max(40,Math.min(860-40,this.x));
    if(this.hitstun<=0&&this.stateTimer<=0) this.facing=opp.x>this.x?-1:1;
    if(this.onGround&&this.hitstun<=0) this.vx*=.7;
  }
  checkHit(opp){
    if(!this.hitbox||opp.invincible>0||opp.hp<=0) return false;
    const hb=this.hitbox;
    const hx=this.x+hb.ox-hb.w/2, hy=this.y+hb.oy-hb.h/2;
    const ox=opp.x-20, oy=opp.y-60;
    if(hx<ox+40&&hx+hb.w>ox&&hy<oy+60&&hy+hb.h>oy){
      const dmg=opp.blocking?Math.floor(hb.dmg*.2):hb.dmg;
      opp.hp=Math.max(0,opp.hp-dmg);
      if(!opp.blocking){ opp.vx=this.facing*hb.kb*-55;opp.vy=-hb.kb*30;opp.hitstun=.08+hb.dmg/120;opp.invincible=.12;opp.state='hurt';opp.stateTimer=opp.hitstun;opp.onGround=false; }
      spark((this.x+opp.x)/2,this.y-35,this.facing,this.color);
      burst((this.x+opp.x)/2,this.y-35,opp.color,hb.type==='special'?16:8,hb.type!=='weak');
      hitStop=hb.type==='special'?.1:hb.type==='strong'?.07:.04;
      this.hitbox=null;
      return true;
    }
    return false;
  }
  draw(){
    if(this.hp<=0&&this.state!=='dead') this.state='dead';
    const drawState=this.ultActive?'special':this.state;
    if(this.charType==='bee'){
      drawBee(this.x,this.y,this.facing,this.color,drawState,this.frame,this.hp,this.blocking,this.ultActive);
    } else {
      drawMantis(this.x,this.y,this.facing,this.color,drawState,this.frame,this.hp,this.blocking,this.ultActive);
    }
  }
  getState(){
    return {x:this.x,y:this.y,vx:this.vx,vy:this.vy,hp:this.hp,facing:this.facing,state:this.state,stateTimer:this.stateTimer,hitstun:this.hitstun,invincible:this.invincible,blocking:this.blocking,hitbox:this.hitbox,specialCooldown:this.specialCooldown,ultActive:this.ultActive,ultTimer:this.ultTimer,ultCooldown:this.ultCooldown,charType:this.charType};
  }
  applyState(s){
    this.x=s.x;this.y=s.y;this.vx=s.vx;this.vy=s.vy;this.hp=s.hp;
    this.facing=s.facing;this.state=s.state;this.stateTimer=s.stateTimer;
    this.hitstun=s.hitstun;this.invincible=s.invincible;this.blocking=s.blocking;
    this.hitbox=s.hitbox;this.specialCooldown=s.specialCooldown||0;
    this.ultActive=s.ultActive||false;this.ultTimer=s.ultTimer||0;this.ultCooldown=s.ultCooldown||0;
    if(s.charType) this.charType=s.charType;
  }
}

// ════════════════════════════════════════════════════
//  게임 상태
// ════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let p1,p2,hitStop=0,running=false;
let roundNum=1,p1Wins=0,p2Wins=0;
let gamePhase='idle',phaseTimer=0;
let raf,prevTime=0;
let stateSendTimer=0;
let isCPUMode=false;

const leaves=Array.from({length:18},()=>({x:Math.random()*860,y:Math.random()*340,size:15+Math.random()*30,angle:Math.random()*Math.PI*2,drift:Math.random()*.3-.15,alpha:.04+Math.random()*.08}));
const vines=Array.from({length:6},()=>({x:Math.random()*860,speed:.3+Math.random()*.4,offset:Math.random()*100}));

function updateNameHUD(){
  const myEmoji = myCharType==='bee'?'🐝':'🦗';
  if(myRole==='host'){
    document.getElementById('p1-name').textContent = myEmoji+' ' + myName;
    document.getElementById('p2-name').textContent = opponentName + ' 🦗';
  } else {
    document.getElementById('p1-name').textContent = '🦗 ' + opponentName;
    document.getElementById('p2-name').textContent = myName + ' '+myEmoji;
  }
}

function initGame(){
  const p1Color = myRole==='guest' ? '#ff6e7f' : myColor;
  const p2Color = myRole==='guest' ? myColor : '#ff6e7f';
  const myChar  = myCharType;
  const oppChar = 'mantis'; // 기본값, player_name 수신 후 교체됨
  const p1Char  = myRole==='guest' ? oppChar : myChar;
  const p2Char  = myRole==='guest' ? myChar  : oppChar;
  p1=new Mantis(180,true,p1Color,p1Char);
  p2=new Mantis(680,false,p2Color,p2Char);
  roundNum=1;p1Wins=0;p2Wins=0;particles=[];
  updateNameHUD();
  updateRoundHUD();
  startRound();
}

function startRound(){
  p1.reset();p2.reset();particles=[];stingers=[];hitStop=0;
  gamePhase='announce';phaseTimer=1.5;
  updateHPHUD();
  showAnnounce('ROUND '+roundNum);
  running=true;
  cancelAnimationFrame(raf);
  prevTime=performance.now();
  raf=requestAnimationFrame(loop);
}

function showAnnounce(txt,color='#fff'){
  const el=document.getElementById('announce');
  el.textContent=txt;el.style.color=color;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1200);
}

function handleRoundEvent(ev){
  if(ev.type==='round_win'){
    // guest 측에서 승패 표시 동기화
    if(ev.winner==='p1') p1Wins=ev.p1Wins;
    else p2Wins=ev.p2Wins;
    updateRoundHUD();
    showAnnounce(ev.announceText, ev.winner==='p1'?'#4dff6e':'#ff4d6e');
  } else if(ev.type==='game_over'){
    endMatch(ev.winner);
  }
}

// ════════════════════════════════════════════════════
//  메인 루프
// ════════════════════════════════════════════════════
function loop(ts){
  const dt=Math.min((ts-prevTime)/1000,.05);
  prevTime=ts;
  if(!running) return;

  phaseTimer-=dt;
  if(gamePhase==='announce'&&phaseTimer<=0){
    gamePhase='fight';showAnnounce('FIGHT!','#f0c040');
  }
  if(gamePhase==='roundover'&&phaseTimer<=0){
    if(p1Wins>=3||p2Wins>=3){ endMatch(p1Wins>=3?'p1':'p2'); return; }
    roundNum++;updateRoundHUD();startRound();return;
  }

  if(hitStop>0){ hitStop-=dt;drawAll();raf=requestAnimationFrame(loop);return; }

  if(gamePhase==='fight'){
    // ── CPU 모드 ──────────────────────────────────────
    if(isCPUMode){
      if(p1.hitstun<=0&&p1.hp>0){
        const spd=p1.blocking?80:230;
        if(keys['ArrowLeft']) p1.vx=-spd;
        else if(keys['ArrowRight']) p1.vx=spd;
        else if(p1.onGround) p1.vx*=.5;
        if(jp['ArrowUp']) p1.jump();
        if(jp['KeyA']) p1.attack('weak');
        if(jp['KeyS']) p1.attack('strong');
        if(jp['KeyD']){
          if(p1.charType==='bee'){ if(p1.specialCooldown<=0){ fireStinger('p1',p1.x,p1.y-40,p1.facing,p1.color); p1.specialCooldown=1.2; } }
          else p1.attack('special');
        }
        if(jp['KeyR']) p1.ultimate();
        if(jp['ArrowDown']&&p1.charType==='bee'&&!p1.onGround) p1.gliding=!p1.gliding;
        p1.blocking=!!(keys['ArrowDown']||keys['KeyF']);
      }
      aiUpdate(p2,p1,dt);
      p1.update(dt,p2);p2.update(dt,p1);
      p1.checkHit(p2);p2.checkHit(p1);
      updateStingers(dt,p1,p2);
      for(const pt of particles){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=700*dt;pt.life-=dt*(pt.spark?3.5:2);}
      particles=particles.filter(p=>p.life>0);
      if(p1.hp<=0||p2.hp<=0){
        gamePhase='roundover';phaseTimer=2.2;
        let winner,txt;
        if(p1.hp<=0&&p2.hp<=0){p1Wins++;p2Wins++;txt='DRAW';winner='draw';}
        else if(p1.hp<=0){p2Wins++;txt='CPU WINS';winner='p2';}
        else{p1Wins++;txt=myName+' WINS';winner='p1';}
        updateRoundHUD();
        showAnnounce(txt,winner==='p1'?'#4dff6e':'#ff4d6e');
        burst(winner==='p1'?p2.x:p1.x,GROUND-20,winner==='p1'?p2.color:p1.color,30,true);
      }
    }
    // ── 온라인 모드 ───────────────────────────────────
    else {
      // 내 입력 전송
      inputSendTimer+=dt;
      if(inputSendTimer>=.016){
        wsSend({type:'input',keys:Object.fromEntries(Object.entries(keys).filter(([,v])=>v))});
        inputSendTimer=0;
      }
      if(myRole==='host'){
        if(p1.hitstun<=0&&p1.hp>0){
          const spd=p1.blocking?80:230;
          if(keys['ArrowLeft']) p1.vx=-spd;
          else if(keys['ArrowRight']) p1.vx=spd;
          else if(p1.onGround) p1.vx*=.5;
          if(jp['ArrowUp']) p1.jump();
          if(jp['KeyA']) p1.attack('weak');
          if(jp['KeyS']) p1.attack('strong');
          if(jp['KeyD']){
            if(p1.charType==='bee'){ if(p1.specialCooldown<=0){ fireStinger('p1',p1.x,p1.y-40,p1.facing,p1.color); p1.specialCooldown=1.2; } }
            else p1.attack('special');
          }
          if(jp['KeyR']) p1.ultimate();
          if(jp['ArrowDown']&&p1.charType==='bee'&&!p1.onGround) p1.gliding=!p1.gliding;
          p1.blocking=!!(keys['ArrowDown']||keys['KeyF']);
        }
        if(p2.hitstun<=0&&p2.hp>0){
          const spd2=p2.blocking?80:230;
          if(opponentKeys['ArrowLeft']) p2.vx=-spd2;
          else if(opponentKeys['ArrowRight']) p2.vx=spd2;
          else if(p2.onGround) p2.vx*=.5;
          if(opponentKeys['ArrowUp']&&!p2._oppJumpHeld){p2.jump();p2._oppJumpHeld=true;}
          if(!opponentKeys['ArrowUp']) p2._oppJumpHeld=false;
          if(opponentKeys['KeyA']&&!p2._oppAHeld){p2.attack('weak');p2._oppAHeld=true;}
          if(!opponentKeys['KeyA']) p2._oppAHeld=false;
          if(opponentKeys['KeyS']&&!p2._oppSHeld){p2.attack('strong');p2._oppSHeld=true;}
          if(!opponentKeys['KeyS']) p2._oppSHeld=false;
          if(opponentKeys['KeyD']&&!p2._oppDHeld){
            if(p2.charType==='bee'){ if(p2.specialCooldown<=0){ fireStinger('p2',p2.x,p2.y-40,p2.facing,p2.color); p2.specialCooldown=1.2; } }
            else p2.attack('special');
            p2._oppDHeld=true;
          }
          if(!opponentKeys['KeyD']) p2._oppDHeld=false;
          if(opponentKeys['KeyR']&&!p2._oppRHeld){p2.ultimate();p2._oppRHeld=true;}
          if(!opponentKeys['KeyR']) p2._oppRHeld=false;
          if(opponentKeys['ArrowDown']&&!p2._oppDownHeld&&p2.charType==='bee'&&!p2.onGround) p2.gliding=!p2.gliding;
          p2._oppDownHeld=!!opponentKeys['ArrowDown'];
          p2.blocking=!!(opponentKeys['ArrowDown']||opponentKeys['KeyF']);
        }
        p1.update(dt,p2);p2.update(dt,p1);
        p1.checkHit(p2);p2.checkHit(p1);
        updateStingers(dt,p1,p2);
        for(const pt of particles){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=700*dt;pt.life-=dt*(pt.spark?3.5:2);}
        particles=particles.filter(p=>p.life>0);
        stateSendTimer+=dt;
        if(stateSendTimer>=.033){
          wsSend({type:'game_state',state:{p1:p1.getState(),p2:p2.getState(),particles:[...particles]}});
          stateSendTimer=0;
        }
        if(p1.hp<=0||p2.hp<=0){
          gamePhase='roundover';phaseTimer=2.2;
          let winner,txt;
          if(p1.hp<=0&&p2.hp<=0){p1Wins++;p2Wins++;txt='DRAW';winner='draw';}
          else if(p1.hp<=0){p2Wins++;txt='ROJO WINS';winner='p2';}
          else{p1Wins++;txt='VERDE WINS';winner='p1';}
          updateRoundHUD();
          showAnnounce(txt,winner==='p1'?'#4dff6e':'#ff4d6e');
          burst(winner==='p1'?p2.x:p1.x,GROUND-20,winner==='p1'?p2.color:p1.color,30,true);
          wsSend({type:'round_event',event:{type:'round_win',winner,p1Wins,p2Wins,announceText:txt}});
          if(p1Wins>=3||p2Wins>=3){
            setTimeout(()=>{wsSend({type:'round_event',event:{type:'game_over',winner:p1Wins>=3?'p1':'p2'}});},2300);
          }
        }
      }
      // guest는 applyRemoteState에서 수신
    }
  }

  for(const k in jp) delete jp[k];
  updateHPHUD();
  updateKeyViewer();
  drawAll();
  raf=requestAnimationFrame(loop);
}

// guest: 서버에서 받은 상태 적용
function applyRemoteState(state){
  if(!p1||!p2) return;
  p1.applyState(state.p1);
  p2.applyState(state.p2);
  particles=state.particles||[];
}

// ════════════════════════════════════════════════════
//  HUD 업데이트
// ════════════════════════════════════════════════════
function updateHPHUD(){
  if(!p1||!p2) return;
  const p1pct=Math.max(0,p1.hp/MAX_HP*100);
  const p2pct=Math.max(0,p2.hp/MAX_HP*100);
  document.getElementById('p1-hp').style.width=p1pct+'%';
  document.getElementById('p2-hp').style.width=p2pct+'%';
  document.getElementById('p1-hpval').textContent=Math.ceil(p1.hp);
  document.getElementById('p2-hpval').textContent=Math.ceil(p2.hp);
  if(p1pct<25) document.getElementById('p1-hp').style.background='linear-gradient(90deg,#ff2020,#ff6040)';
  if(p2pct<25) document.getElementById('p2-hp').style.background='linear-gradient(90deg,#ff2020,#ff6040)';
}
function updateRoundHUD(){
  document.getElementById('round-disp').textContent='ROUND '+roundNum;
  for(let i=0;i<3;i++){
    document.getElementById('p1-w'+i).className='win-bar'+(i<p1Wins?' filled-p1':'');
    document.getElementById('p2-w'+i).className='win-bar'+(i<p2Wins?' filled-p2':'');
  }
}

// ════════════════════════════════════════════════════
//  결과 / 리매치
// ════════════════════════════════════════════════════
function endMatch(winner){
  running=false;
  const isP1Win=winner==='p1';
  const myWin=(myRole==='host'&&isP1Win)||(myRole==='guest'&&!isP1Win);
  document.getElementById('result-winner').textContent=myWin?'🏆 YOU':'💀 OPPONENT';
  document.getElementById('result-winner').style.color=myWin?'#4dff6e':'#ff4d6e';
  document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));
  document.getElementById('result-screen').classList.remove('hidden');
}
function requestRematch(){
  document.getElementById('result-screen').classList.add('hidden');
  if(isCPUMode){
    p1Wins=0;p2Wins=0;roundNum=1;initGame();
  } else {
    wsSend({type:'round_event',event:{type:'rematch'}});
    if(myRole==='host'){ p1Wins=0;p2Wins=0;roundNum=1;initGame(); }
  }
}

// ════════════════════════════════════════════════════
//  배경 / 그리기
// ════════════════════════════════════════════════════
function drawAll(){
  ctx.clearRect(0,0,860,480);
  const sky=ctx.createLinearGradient(0,0,0,480);sky.addColorStop(0,'#0a1a06');sky.addColorStop(.5,'#122808');sky.addColorStop(1,'#1a3408');ctx.fillStyle=sky;ctx.fillRect(0,0,860,480);
  drawBackground();
  const gGrad=ctx.createLinearGradient(0,GROUND,0,GROUND+90);gGrad.addColorStop(0,'#2a4a10');gGrad.addColorStop(.3,'#1a3008');gGrad.addColorStop(1,'rgba(10,20,4,0)');ctx.fillStyle=gGrad;ctx.fillRect(0,GROUND,860,90);
  ctx.strokeStyle='rgba(80,160,30,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(860,GROUND);ctx.stroke();
  for(let i=0;i<30;i++){ctx.fillStyle=`rgba(60,120,20,${.1+Math.random()*.1})`;ctx.beginPath();ctx.ellipse(i*32+Math.sin(i)*10,GROUND+4,8+Math.random()*12,2,0,0,Math.PI*2);ctx.fill();}
  for(const pt of particles){ctx.save();ctx.globalAlpha=Math.max(0,pt.life);ctx.fillStyle=pt.color;ctx.shadowColor=pt.color;ctx.shadowBlur=pt.spark?10:4;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.size*Math.max(.1,pt.life),0,Math.PI*2);ctx.fill();ctx.restore();}
  drawStingers();
  if(p2) p2.draw();
  if(p1) p1.draw();
  [p1,p2].forEach(f=>{if(f&&f.hp>0&&f.hp<20&&Math.floor(Date.now()/200)%2===0){ctx.save();ctx.globalAlpha=.08;ctx.fillStyle=f.color;ctx.fillRect(0,0,860,480);ctx.restore();}});
}
function drawBackground(){
  ctx.save();ctx.fillStyle='rgba(200,230,150,.08)';ctx.beginPath();ctx.arc(430,80,60,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(200,230,150,.04)';ctx.beginPath();ctx.arc(430,80,100,0,Math.PI*2);ctx.fill();ctx.restore();
  [{x:60,h:250,w:40},{x:150,h:200,w:30},{x:700,h:240,w:38},{x:780,h:190,w:28},{x:320,h:180,w:25},{x:540,h:200,w:32},{x:420,h:160,w:22}].forEach(tr=>{
    ctx.fillStyle='rgba(5,18,3,.7)';ctx.fillRect(tr.x-tr.w*.15,GROUND-tr.h,tr.w*.3,tr.h);
    for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(tr.x+(i-1)*tr.w*.4,GROUND-tr.h+i*10,tr.w*.7,tr.h*.4,0,0,Math.PI*2);ctx.fill();}
  });
  leaves.forEach(lf=>{lf.angle+=lf.drift*.01;ctx.save();ctx.translate(lf.x,lf.y);ctx.rotate(lf.angle);ctx.globalAlpha=lf.alpha;ctx.fillStyle='#3a8820';ctx.beginPath();ctx.ellipse(0,0,lf.size,lf.size*.3,0,0,Math.PI*2);ctx.fill();ctx.restore();});
  vines.forEach(v=>{ctx.save();ctx.strokeStyle='rgba(40,100,20,.25)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(v.x,0);for(let y=0;y<GROUND*.6;y+=20) ctx.lineTo(v.x+Math.sin(y*.05+v.offset)*12,y);ctx.stroke();ctx.restore();});
}

// 초기 화면 그리기
initColorPicker();
drawAll();
</script>
